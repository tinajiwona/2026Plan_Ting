<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Plan Schedule - Choose Language</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 60px 40px;
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            font-size: 2.5em;
            color: #667eea;
            margin-bottom: 20px;
        }
        
        .subtitle {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 50px;
            line-height: 1.6;
        }
        
        .language-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 15px 40px;
            font-size: 1.1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            min-width: 180px;
        }
        
        .btn-chinese {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-chinese:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn-english {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            color: white;
        }
        
        .btn-english:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(118, 75, 162, 0.3);
        }
        
        .features {
            margin-top: 50px;
            text-align: left;
            padding: 30px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .features h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.2em;
        }
        
        .features ul {
            list-style: none;
            color: #666;
            line-height: 2;
        }
        
        .features li:before {
            content: "✓ ";
            color: #667eea;
            font-weight: bold;
            margin-right: 10px;
        }
        
        .github-link {
            margin-top: 30px;
            font-size: 0.9em;
            color: #999;
        }
        
        .github-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        
        .github-link a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 40px 20px;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .language-buttons {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 2026 Plan Schedule</h1>
        <div class="subtitle">
            <p>Choose your language / 选择你的语言</p>
            <p>Interactive planner for organizing your 2026 plans</p>
        </div>
        
        <div class="language-buttons">
            <button class="btn btn-chinese" onclick="window.location.href='2026_plan.html'">
                🇨🇳 中文版本<br><small style="font-size: 0.8em; opacity: 0.9;">Chinese</small>
            </button>
            <button class="btn btn-english" onclick="window.location.href='2026_plan_en.html'">
                🇬🇧 English Version<br><small style="font-size: 0.8em; opacity: 0.9;">English</small>
            </button>
        </div>
        
        <div class="features">
            <h3>✨ Key Features</h3>
            <ul>
                <li>点击即可编辑 / Click to edit</li>
                <li>自动保存 / Auto-save</li>
                <li>数据同步 / Data sync</li>
                <li>响应式设计 / Responsive design</li>
                <li>无需注册 / No registration needed</li>
            </ul>
        </div>
        
        <div class="github-link">
            📌 View on GitHub: <a href="https://github.com/tinajiwona/2026Plan_Ting" target="_blank">2026Plan_Ting</a>
        </div>
    </div>
</body>
</html>
